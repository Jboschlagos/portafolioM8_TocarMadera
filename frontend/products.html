<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tocar Madera | Productos</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Estilos propios -->
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <!-- ── Navbar ─────────────────────────────────────────────── -->
    <div id="navbar-container"></div>

    <!-- ── Contenido principal ─────────────────────────────────── -->
    <main class="page-container">
        <h2 class="section-title">
            <i class="bi bi-grid"></i> Catálogo de productos
        </h2>

        <!-- ── Catálogo y mapa lado a lado ───────────────────────── -->
        <section class="row g-4">
            <!-- Columna catálogo -->
            <div class="col-12 col-lg-7">
                <div id="listaProductos" class="row g-3">
                    <!-- Se cargan dinámicamente con JS -->
                </div>
            </div>


            <!-- Columna mapa -->
            <div class="col-12 col-lg-5">
                <div class="mapa-wrapper">
                    <button class="btn-encuadre" onclick="encuadrarChile()">
                        <i class="bi bi-fullscreen"></i> Ver Chile completo
                    </button>
                    <div id="mapa"></div>
                </div>
            </div>

            <!-- ── Modal detalle producto ─────────────────────────────── -->
            <div class="modal fade" id="modalProducto" tabindex="-1" aria-labelledby="modalProductoLabel"
                aria-hidden="true">
                <div class="modal-dialog modal-lg modal-dialog-centered">
                    <article class="modal-content" style="border-radius: 12px;">

                        <header class="modal-header" style="border-bottom: 2px solid var(--madera);">
                            <h4 class="modal-title" id="modalNombre"></h4>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </header>

                        <section class="modal-body">
                            <div class="row g-3">

                                <!-- Carrusel grande -->
                                <figure class="col-12 col-md-6">
                                    <div id="modalCarrusel" class="carousel slide" data-bs-ride="carousel">
                                        <div class="carousel-inner" id="modalCarruselSlides"></div>
                                        <button class="carousel-control-prev" type="button"
                                            data-bs-target="#modalCarrusel" data-bs-slide="prev">
                                            <span class="carousel-control-prev-icon"></span>
                                        </button>
                                        <button class="carousel-control-next" type="button"
                                            data-bs-target="#modalCarrusel" data-bs-slide="next">
                                            <span class="carousel-control-next-icon"></span>
                                        </button>
                                    </div>
                                </figure>

                                <!-- Detalle -->
                                <section class="col-12 col-md-6">
                                    <p id="modalPrecio" class="card-price" style="font-size: 1.5rem;"></p>
                                    <p id="modalUbicacion" class="card-location mb-3"></p>
                                    <p id="modalDescripcion" style="color: var(--gris-texto); font-size: 0.9rem;"></p>

                                    <div class="d-flex gap-2 mt-3">
                                        <button id="modalBtnCarrito" onclick="agregarAlCarrito()"
                                            class="btn-agregar flex-grow-1">
                                            <i class="bi bi-cart-plus"></i> Agregar al carrito
                                        </button>
                                        <button id="modalBtnCompartir" onclick="compartirProducto()" class="btn btn-sm"
                                            style="background-color: var(--madera); color: white; border-radius: 6px; padding: 0.4rem 1rem;">
                                            <i class="bi bi-share"></i>
                                        </button>
                                    </div>
                                </section>

                            </div>
                        </section>

                    </article>
                </div>
            </div>

            <!-- ── Footer ─────────────────────────────────────────────── -->
            <div id="footer-container"></div>

            <!-- ── Scripts ─────────────────────────────────────────────── -->
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
            <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
            <script src="js/components.js"></script>
            <script src="js/products.js"></script>
</body>

</html>
