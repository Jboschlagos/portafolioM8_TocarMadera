<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tocar Madera | Subir Imagen</title>

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Estilos propios -->
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- ── Navbar ─────────────────────────────────────────────── -->
    <div id="navbar-container"></div>

    <!-- ── Contenido principal ─────────────────────────────────── -->
    <main class="page-container">
      <h2 class="section-title">
        <i class="bi bi-cloud-upload"></i> Subir imagen de producto
      </h2>

      <section class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
          <!-- Formulario de upload -->
          <form
            id="uploadForm"
            onsubmit="
              event.preventDefault();
              subirImagen();
            "
            class="card shadow-sm p-4"
            style="border-radius: 12px; border: 1px solid var(--gris-medio)"
          >
            <!-- Selector de producto -->
            <div class="mb-3">
              <label for="selectProducto" class="form-label">Producto</label>
              <select id="selectProducto" class="form-select" required>
                <option value="">Selecciona un producto...</option>
              </select>
            </div>

            <!-- Selector de archivo -->
            <div class="mb-3">
              <label for="inputImagen" class="form-label">Imagen</label>
              <input
                type="file"
                id="inputImagen"
                class="form-control"
                accept="image/jpeg, image/png, image/webp"
                required
              />
              <small style="color: var(--gris-texto)">
                Formatos permitidos: JPG, PNG, WEBP. Máximo 2MB.
              </small>
            </div>

            <!-- Preview de la imagen -->
            <figure id="previewContainer" class="mb-3" style="display: none">
              <img
                id="previewImagen"
                alt="Preview"
                style="
                  width: 100%;
                  height: 200px;
                  object-fit: cover;
                  border-radius: 8px;
                  border: 1px solid var(--gris-medio);
                "
              />
            </figure>

            <!-- Botón subir -->
            <button type="submit" class="btn-agregar w-100">
              <i class="bi bi-cloud-upload"></i> Subir imagen
            </button>

            <!-- Mensaje de resultado -->
            <output id="uploadMessage" class="mt-3 d-block"></output>
          </form>
        </div>
      </section>
    </main>

    <!-- ── Footer ─────────────────────────────────────────────── -->
    <div id="footer-container"></div>

    <!-- ── Scripts ─────────────────────────────────────────────── -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/components.js"></script>
    <script src="js/upload.js"></script>
  </body>
</html>
