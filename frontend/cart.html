<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tocar Madera | Mi Carrito</title>

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Estilos propios -->
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- ── Navbar ─────────────────────────────────────────────── -->
    <div id="navbar-container"></div>

    <!-- ── Contenido principal ─────────────────────────────────── -->
    <main class="page-container">
      <h2 class="section-title"><i class="bi bi-cart"></i> Mi Carrito</h2>

      <!-- ── Lista de items del carrito ────────────────────────── -->
      <section class="row g-4">
        <!-- Columna items -->
        <div class="col-12 col-lg-8">
          <div id="listaCarrito">
            <!-- Se carga dinámicamente con JS -->
          </div>
        </div>

        <!-- Columna resumen -->
        <aside class="col-12 col-lg-4">
          <section
            class="card shadow-sm"
            style="border-radius: 12px; border: 1px solid var(--gris-medio)"
          >
            <div class="card-body p-4">
              <h3
                style="
                  font-size: 1.1rem;
                  font-weight: 600;
                  border-bottom: 2px solid var(--madera);
                  padding-bottom: 0.5rem;
                  margin-bottom: 1rem;
                "
              >
                Resumen del pedido
              </h3>
              <div class="d-flex justify-content-between mb-2">
                <span style="color: var(--gris-texto)">Subtotal</span>
                <span id="subtotal" style="font-weight: 600">$0</span>
              </div>
              <div class="d-flex justify-content-between mb-3">
                <span style="color: var(--gris-texto)">Envío</span>
                <span style="color: var(--verde-musgo)">A coordinar</span>
              </div>
              <hr />
              <div class="d-flex justify-content-between mb-3">
                <span style="font-weight: 700">Total</span>
                <span
                  id="total"
                  style="
                    font-weight: 700;
                    font-size: 1.2rem;
                    color: var(--verde-musgo);
                  "
                  >$0</span
                >
              </div>
              <button class="btn-agregar w-100" onclick="finalizarCompra()">
                <i class="bi bi-bag-check"></i> Finalizar compra
              </button>
              <a
                href="products.html"
                class="btn w-100 mt-2"
                style="
                  border: 1px solid var(--gris-medio);
                  color: var(--gris-texto);
                  border-radius: 6px;
                "
              >
                <i class="bi bi-arrow-left"></i> Seguir comprando
              </a>
            </div>
          </section>
        </aside>
      </section>
    </main>

    <!-- ── Footer ─────────────────────────────────────────────── -->
    <div id="footer-container"></div>

    <!-- ── Scripts ─────────────────────────────────────────────── -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/components.js"></script>
    <script src="js/cart.js"></script>
  </body>
</html>
