<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tocar Madera | Entrevistas</title>

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Estilos propios -->
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/entrevistas.css" />
  </head>

  <body>
    <!-- ── Navbar ─────────────────────────────────────────────── -->
    <div id="navbar-container"></div>

    <!-- ── Contenido principal ─────────────────────────────────── -->
    <main class="page-container">
      <h2 class="section-title">
        <i class="bi bi-camera-video"></i> Entrevistas a Artesanos
      </h2>

      <!-- ── Filtros ────────────────────────────────────────────── -->
      <section class="entrevistas-filtros">
        <div class="row g-3">
          <div class="col-12 col-md-4">
            <label for="filtroOficio" class="form-label">Oficio</label>
            <input
              type="text"
              id="filtroOficio"
              class="form-control"
              placeholder="Ej: Carpintería, Tallado..."
            />
          </div>
          <div class="col-12 col-md-4">
            <label for="filtroCiudad" class="form-label">Ciudad</label>
            <input
              type="text"
              id="filtroCiudad"
              class="form-control"
              placeholder="Ej: Valparaíso, Santiago..."
            />
          </div>
          <div class="col-12 col-md-4">
            <label for="filtroFecha" class="form-label">Año</label>
            <input
              type="number"
              id="filtroFecha"
              class="form-control"
              placeholder="Ej: 2024"
            />
          </div>
          <div class="col-12">
            <button
              id="btnFiltrar"
              class="btn"
              style="background-color: var(--verde-musgo); color: white"
            >
              <i class="bi bi-funnel"></i> Filtrar
            </button>
            <button id="btnLimpiar" class="btn btn-outline-secondary">
              <i class="bi bi-arrow-clockwise"></i> Limpiar filtros
            </button>
          </div>
        </div>
      </section>

      <!-- ── Grid de entrevistas ────────────────────────────────── -->
      <section class="entrevistas-grid" id="listaEntrevistas">
        <!-- Se cargan dinámicamente con JS -->
        <p style="color: var(--gris-texto)">Cargando entrevistas...</p>
      </section>

      <!-- ── Paginación ─────────────────────────────────────────── -->
      <nav aria-label="Paginación" class="mt-5">
        <ul class="pagination justify-content-center" id="paginacion">
          <!-- Se genera dinámicamente -->
        </ul>
      </nav>
    </main>

    <!-- ── Footer ─────────────────────────────────────────────── -->
    <div id="footer-container"></div>

    <!-- ── Scripts ─────────────────────────────────────────────── -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/components.js"></script>
    <script src="js/entrevistas-pagina.js"></script>
  </body>
</html>
